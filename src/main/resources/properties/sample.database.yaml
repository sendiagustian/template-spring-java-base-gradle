database:
  engine: sqlite #only option: sqlite, postgresql, mysql, oracle
  
  local:
    url: jdbc:sqlite:./data/local.db
    username:
    password:

  dev:    
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_dev}
    username: ${DB_USER:dev_user}
    password: ${DB_PASS:dev_pass}

  prod:    
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_prod}
    username: ${DB_USER:prod_user}
    password: ${DB_PASS:prod_pass}
