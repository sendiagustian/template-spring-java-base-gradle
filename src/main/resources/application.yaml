spring:
    # Debugging configuration
    devtools:
        add-properties: false
        restart:
            enabled: true
            additional-paths: src
    # Banner configuration
    banner:
        location: "classpath:assets/banner.txt"

    # External configuration files
    config:
        import:
            - "classpath:properties/server.yaml"
            - "classpath:properties/logging.yaml"
            - "classpath:properties/database.yaml"
            - "classpath:properties/scalar.yaml"

    # Web configuration
    web:
        resources:
            add-mappings: true
        error:
            include-message: always
            include-binding-errors: never
            include-stacktrace: never

    # Multipart configuration for file uploads
    servlet:
        multipart:
            enabled: true
            max-file-size: 10MB
            max-request-size: 10MB
            file-size-threshold: 2KB
